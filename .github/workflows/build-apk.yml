name: Build Client APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # channel: stable -> récupère la dernière version stable de Flutter,
      # qui embarque un Dart >= 3.10.7 (requis par le pubspec du Client).
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      # firebase_core 4.x exige minSdk 23. Le build.gradle.kts utilise
      # flutter.minSdkVersion (souvent 21) -> on force 23 pour éviter l'échec.
      - name: Force minSdk 23
        run: |
          GR=android/app/build.gradle.kts
          if [ -f "$GR" ]; then
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' "$GR"
            echo "minSdk forcé à 23"
          fi

      - name: Pub get
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: velox-client-apk
          path: build/app/outputs/flutter-apk/app-release.apk
