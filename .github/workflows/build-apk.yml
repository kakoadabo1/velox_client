name: Build Client APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Version ÉPINGLÉE : 3.38.4 (celle d'origine du projet, cf. pubspec.lock).
      # Elle embarque Dart 3.10.7 (requis par ^3.10.7) ET reste en AGP 8.
      # On évite ainsi Flutter 3.44 (channel stable), qui force AGP 9 et casse
      # le plugin Gradle de Flutter (erreur "generateLockfiles").
      - name: Setup Flutter 3.38.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.4
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: velox-client-apk
          path: build/app/outputs/flutter-apk/app-release.apk
