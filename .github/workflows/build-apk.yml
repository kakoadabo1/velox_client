name: Build Client APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter 3.38.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.4
          channel: stable

      - name: Flutter version
        run: flutter --version

      # (1) Coquille Gradle racine saine + gradle.properties maîtrisé.
      - name: Régénérer la coquille Gradle racine (Flutter 3.38.4)
        run: |
          flutter create --platforms=android --org dj.velox /tmp/fresh >/dev/null
          cp /tmp/fresh/android/settings.gradle.kts android/settings.gradle.kts
          cp /tmp/fresh/android/build.gradle.kts android/build.gradle.kts
          cp /tmp/fresh/android/gradle/wrapper/gradle-wrapper.properties \
             android/gradle/wrapper/gradle-wrapper.properties
          sed -i '/id("com.android.application")/a\    id("com.google.gms.google-services") version "4.3.15" apply false' android/settings.gradle.kts
          {
            echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g"
            echo "android.useAndroidX=true"
            echo "org.gradle.daemon=false"
            echo "org.gradle.parallel=false"
            echo "org.gradle.workers.max=2"
          } > android/gradle.properties

      # (2) Clé + key.properties : signature release toujours OK.
      - name: Générer la clé de signature
        run: |
          keytool -genkeypair -v \
            -keystore /tmp/velox.jks \
            -storepass velox123 -keypass velox123 \
            -alias velox -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=VELOX, OU=Dev, O=Nomade, L=Djibouti, C=DJ"
          {
            echo "storePassword=velox123"
            echo "keyPassword=velox123"
            echo "keyAlias=velox"
            echo "storeFile=/tmp/velox.jks"
          } > android/key.properties

      # (3) Corrections code pour la compilation Linux (sensible à la casse) :
      #   - secrets.dart est gitignoré -> généré depuis le template.
      #   - 6 imports écrivent "HomeScreen" alors que le dossier réel est
      #     "homeScreen" -> on aligne la casse sur le vrai dossier.
      - name: Préparer le code pour la CI
        run: |
          [ -f lib/config/secrets.dart ] || cp lib/config/secrets.template.dart lib/config/secrets.dart
          grep -rl "screens/HomeScreen/" lib | xargs -r sed -i 's#screens/HomeScreen/#screens/homeScreen/#g'
          echo "secrets.dart prêt + casse HomeScreen normalisée."

      - name: Pub get
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: velox-client-apk
          path: build/app/outputs/flutter-apk/app-release.apk
