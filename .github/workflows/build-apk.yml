name: Build Client APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter 3.38.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.4
          channel: stable

      - name: Flutter version
        run: flutter --version

      # (1) Régénère la coquille Gradle racine (corrige "generateLockfiles").
      - name: Régénérer la coquille Gradle racine (Flutter 3.38.4)
        run: |
          flutter create --platforms=android --org dj.velox /tmp/fresh >/dev/null
          cp /tmp/fresh/android/settings.gradle.kts android/settings.gradle.kts
          cp /tmp/fresh/android/build.gradle.kts android/build.gradle.kts
          cp /tmp/fresh/android/gradle/wrapper/gradle-wrapper.properties \
             android/gradle/wrapper/gradle-wrapper.properties
          sed -i '/id("com.android.application")/a\    id("com.google.gms.google-services") version "4.3.15" apply false' android/settings.gradle.kts
          grep -q "android.useAndroidX=true" android/gradle.properties || \
            echo "android.useAndroidX=true" >> android/gradle.properties

      # (2) Génère une clé + key.properties pour que la signature release marche
      #     QUEL QUE SOIT le contenu de app/build.gradle.kts (fini le crash
      #     "null cannot be cast to non-null type kotlin.String").
      - name: Générer la clé de signature
        run: |
          keytool -genkeypair -v \
            -keystore /tmp/velox.jks \
            -storepass velox123 -keypass velox123 \
            -alias velox -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=VELOX, OU=Dev, O=Nomade, L=Djibouti, C=DJ"
          {
            echo "storePassword=velox123"
            echo "keyPassword=velox123"
            echo "keyAlias=velox"
            echo "storeFile=/tmp/velox.jks"
          } > android/key.properties
          echo "----- android/key.properties -----"
          cat android/key.properties

      - name: Pub get
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: velox-client-apk
          path: build/app/outputs/flutter-apk/app-release.apk
