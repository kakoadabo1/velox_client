name: Build Client APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter 3.38.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.4
          channel: stable

      - name: Flutter version
        run: flutter --version

      # L'erreur "generateLockfiles" vient des fichiers Gradle RACINE du projet,
      # désynchronisés du plugin Gradle de Flutter 3.38.4. On les régénère depuis
      # un projet template tout neuf (même Flutter), puis on ré-injecte le plugin
      # Firebase. On ne touche PAS à app/build.gradle.kts, AndroidManifest,
      # MainActivity ni google-services.json -> package, Firebase et signature
      # restent intacts.
      - name: Régénérer la coquille Gradle racine (Flutter 3.38.4)
        run: |
          flutter create --platforms=android --org dj.velox /tmp/fresh >/dev/null
          cp /tmp/fresh/android/settings.gradle.kts android/settings.gradle.kts
          cp /tmp/fresh/android/build.gradle.kts android/build.gradle.kts
          cp /tmp/fresh/android/gradle/wrapper/gradle-wrapper.properties \
             android/gradle/wrapper/gradle-wrapper.properties
          # Ré-injecter le plugin Firebase (google-services) dans le settings frais
          sed -i '/id("com.android.application")/a\    id("com.google.gms.google-services") version "4.3.15" apply false' android/settings.gradle.kts
          # S'assurer qu'AndroidX est bien activé
          grep -q "android.useAndroidX=true" android/gradle.properties || \
            echo "android.useAndroidX=true" >> android/gradle.properties
          echo "----- settings.gradle.kts régénéré -----"
          cat android/settings.gradle.kts

      - name: Pub get
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: velox-client-apk
          path: build/app/outputs/flutter-apk/app-release.apk
