org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Flutter (récent) lit le nouveau DSL d'AGP 9, incompatible avec le plugin
# Gradle de Flutter sur un projet AGP 8.x -> erreur "generateLockFiles".
# On force l'ancien DSL pour rester compatible avec AGP 8.11.1.
android.newDsl=false
